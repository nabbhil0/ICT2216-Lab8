name: ESLint Code Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint and generate SARIF
        id: eslint-scan
        continue-on-error: true
        run: |
          mkdir -p reports
          npx eslint . \
            --format=@microsoft/eslint-formatter-sarif \
            --output-file=reports/eslint-results.sarif

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/eslint-results.sarif
          category: eslint

      - name: Fail if ESLint found issues
        if: steps.eslint-scan.outcome == 'failure'
        run: |
          echo "ESLint detected code-quality or security issues."
          exit 1
